title: Lefuse | Digital Publishing Network
email: partners@lefuse.com
description: Lefuse is a digital publishing network operating niche content websites focused on wellness, supplements, and lifestyle.
baseurl: "" # Keep this empty if deploying to root of domain
url: "https://lefuse.com" # Update this with your actual domain
twitter_username: lefusenetwork
github_username: lefuse

# SEO & Social Media Meta
lang: en
logo: /assets/images/cover.svg

# Plugins
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag # Add this for better SEO metadata
  - jekyll-sitemap # Optional but recommended

# Sitemap config (if jekyll-sitemap is used)
defaults:
  -
    scope:
      path: ""
    values:
      changefreq: monthly
      priority: 0.5

# Collections (cleaned)
# Removed 'cases' collection

# Optional - exclude unnecessary files
exclude:
  - README.md
  - node_modules/
  - Gemfile
  - Gemfile.lock