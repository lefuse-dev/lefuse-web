<div class="case-cover">
    <h1>{{ page.title }}</h1>
  
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  
    {% if page.tags %}
      <div class="case-tags-container">
        {% for tag in page.tags %}
          <div class="case-tag">{{ tag }}</div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
